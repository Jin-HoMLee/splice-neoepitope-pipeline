name: splice-neoepitope-hisat2
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - hisat2 >=2.2.1
  - python >=3.11,<3.13
  - pandas
  - regtools >=1.0.0
  # samtools intentionally omitted — conflicts with regtools via libdeflate version;
  # samtools from the base conda env is used instead (installed during setup)
