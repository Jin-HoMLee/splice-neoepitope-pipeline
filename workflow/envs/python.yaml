name: splice-neoepitope-python
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python >=3.11,<3.13
  - biopython >=1.81
  - pandas >=2.0
  - numpy >=1.25
  - scipy >=1.11
  - matplotlib >=3.8
  - seaborn >=0.13
  - requests >=2.31
  - jinja2 >=3.1
  - pytest >=8.0
  - pip
  - pip:
    # Ada (RunPod L4, SM 8.9) is supported by current PyPI CUDA wheels — the P100/Pascal
    # cu126 pin + extra-index-url is dropped (Issue #844 GCP→RunPod migration).
    - torch >=2.12
    - mhcflurry >=2.0
