name: splice-neoepitope-python
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python >=3.11
  - biopython >=1.81
  - pandas >=2.0
  - numpy >=1.25
  - scipy >=1.11
  - matplotlib >=3.8
  - seaborn >=0.13
  - requests >=2.31
  - jinja2 >=3.1
  - tensorflow >=2.10  # Required by MHCflurry
  - pip
  - pip:
    - mhcflurry >=2.0
