name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline-snakemake-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Snakemake
        run: pip install "snakemake==8.30.0"

      - name: Create placeholder input files
        run: |
          mkdir -p data/test
          touch data/test/SRR9143066_test.fastq.gz
          touch data/test/SRR9143065_test.fastq.gz

      - name: Dry-run with GPU config overlay
        run: |
          snakemake -n \
            --configfile config/config.yaml config/gpu.yaml \
            --config samples_tsv=config/samples/patient_001_test.tsv

  pipeline-pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: workflow/tests/requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r workflow/tests/requirements-test.txt

      - name: Run tests
        run: pytest workflow/tests/ -v
