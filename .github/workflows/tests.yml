name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline-snakemake-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Snakemake
        run: pip install "snakemake==8.30.0"

      - name: Create placeholder input files
        run: |
          mkdir -p data/test resources
          touch data/test/SRR9143066_test.fastq.gz
          touch data/test/SRR9143065_test.fastq.gz
          touch resources/gencode.v47.annotation.gtf.gz
          touch resources/GRCh38.primary_assembly.genome.fa
          touch resources/human_proteome.fasta

      - name: Dry-run with GPU config overlay
        run: |
          snakemake -n \
            --configfile config/config.yaml config/gpu_config.yaml \
            --config samples_tsv=config/samples/patient_001_test.tsv

  pipeline-pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: workflow/tests/requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r workflow/tests/requirements-test.txt

      - name: Run tests
        run: pytest workflow/tests/ -v

  ci-tools-pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run CI-tooling tests
        run: pytest tools/ci/ -v
        env:
          # PAT with `read:project` scope; integration tests that resolve
          # project items via GraphQL need this scope (the default
          # GITHUB_TOKEN is repo-scoped only and cannot read Projects v2).
          # Secret may be absent on fork PRs — tests probe for scope at
          # collection time and skip gracefully if unavailable.
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
