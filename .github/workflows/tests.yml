name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline-snakemake-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Snakemake
        run: pip install "snakemake==8.30.0"

      - name: Create placeholder input files
        run: |
          mkdir -p data/test references
          touch data/test/SRR9143066_test.fastq.gz
          touch data/test/SRR9143065_test.fastq.gz
          touch references/gencode.v47.annotation.gtf.gz
          touch references/GRCh38.primary_assembly.genome.fa
          touch references/human_proteome.fasta

      - name: Dry-run with GPU config overlay
        run: |
          snakemake -n \
            --configfile config/config.yaml config/gpu_config.yaml \
            --config samples_tsv=config/samples/patient_001_test.tsv

  pipeline-pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: workflow/tests/requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r workflow/tests/requirements-test.txt

      - name: Run tests
        run: pytest workflow/tests/ -v

  research-pytest:
    # Research-side suites were CI-invisible until now: research/requirements.txt
    # has declared `pytest` all along, but no job ever ran them, so the
    # issue_547 calibration tests and the research/scripts suites could rot
    # silently. Same regression class as tools/project_map (#713) and
    # scripts/tests (#901), both of which were CI-invisible until added to a job.
    #
    # Split from ci-tools-pytest because these need the scientific stack
    # (numpy/scipy/scikit-learn), which the pytest-only tooling job deliberately
    # does not carry.
    #
    # Collection scope: list each suite dir explicitly. `pytest research/` would
    # descend into research/.venv (a per-clone, gitignored venv) and collect
    # third-party tests out of site-packages.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: research/requirements.txt

      - name: Install research dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r research/requirements.txt

      - name: Run research tests
        run: |
          pytest research/scripts/ -v
          pytest research/experiments/issue_547_immunogenicity_calibration/tests/ -v
          pytest research/experiments/issue_919_nh_uniqueness_filter/tests/ -v
          pytest research/experiments/issue_1116_junction_repeat_score/tests/ -v

  ci-tools-pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest pyyaml

      - name: Run CI-tooling tests
        # Collection scope: every tools/<dir>/ AND scripts/tests/ with a test
        # suite must be listed here explicitly - pytest does NOT recurse into
        # tools/ (or scripts/) as a whole, so a new test home is silently skipped
        # until added below.
        # Separate invocations so each dir is collected in isolation - tools/ci
        # and tools/news carry their own pytest.ini for marker registration
        # (tools/project_map has none; isolation still keeps collection scopes
        # clean). tools/news is the morning-news poller (Issue #639);
        # tools/project_map is the project-map atlas extractor (Issue #713 -
        # the invariant suite was CI-invisible under tools/, regressions
        # ungated). project_map's extractor discovers files via `git ls-files`
        # (Issue #780), so the atlas is reproducible across working-tree states
        # (a populated local clone matches a clean checkout); it needs git on
        # PATH, which the actions/checkout step provides. scripts/tests holds the
        # PM board-tooling suites (board_open_items, arc labels, and the
        # scan_addressed_comments Beat-2 scanner, Issue #901) - it was
        # CI-invisible until #901 added it here, the same regression class #713
        # fixed for tools/project_map.
        #
        # tools/ci also carries the hook-liveness contract suite
        # (test_hook_liveness_contract.py, Issue #1140): it drives every hook
        # registered in .agents/settings.json through its real subprocess entry
        # path and asserts the observable artifact, so an inert hook (one that
        # never fires on its real trigger) reds this job. This runs on every PR,
        # which covers "any change under .agents/hooks/ or .agents/settings.json"
        # and then some (a hook regressed by an unrelated change is caught too).
        #
        # `-m "not live"` deselects the live-API smoke (Issue #711): a transient
        # GitHub-API blip must not red this per-PR job (or poison the hermetic
        # unit signal sharing it). The live recheck smoke now runs nightly +
        # non-blocking via recheck-live-smoke.yml; per-PR integration is covered
        # hermetically by TestRecheckHermeticIntegration (recorded gh fixtures).
        run: |
          pytest tools/ci/ -v -m "not live"
          pytest tools/news/ -v
          pytest tools/project_map/ -v
          pytest scripts/tests/ -v
        env:
          # PAT with `read:project` scope; integration tests that resolve
          # project items via GraphQL need this scope (the default
          # GITHUB_TOKEN is repo-scoped only and cannot read Projects v2).
          # Secret may be absent on fork PRs — tests probe for scope at
          # collection time and skip gracefully if unavailable.
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}

  pipeline-conda-env-solve:
    # Catch conda solver regressions (e.g. the bioconda libdeflate/htslib
    # transition that broke star.yaml — Issue #629) at PR time. The
    # snakemake dry-run does NOT build conda envs, so an unsatisfiable spec
    # only surfaces on a real `--use-conda` run on the VM (hours in). This job
    # solves every env up front. ubuntu-latest is linux-64 + Miniforge
    # (channel-priority strict), matching the GPU VM, so the solve is faithful.
    # Native glibc is >=2.35 (Ubuntu 22.04+ runner), matching the production VM,
    # so CONDA_OVERRIDE_GLIBC (the knob the macOS dev cross-solve needs — see
    # star.yaml) is unnecessary here.
    # Limitation: `--dry-run` solves the conda layer only; `pip:` blocks (e.g.
    # python.yaml's torch pin) are not resolved here.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Miniforge (conda, bioconda/conda-forge, strict)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          channels: conda-forge,bioconda
          channel-priority: strict

      - name: Dry-run solve every workflow/envs/*.yaml
        shell: bash -el {0}
        run: |
          set -uo pipefail
          shopt -s nullglob
          envs=( workflow/envs/*.yaml )
          if [[ ${#envs[@]} -eq 0 ]]; then
            echo "::error::No workflow/envs/*.yaml files found — nothing to solve"; exit 1
          fi
          fail=0
          for env in "${envs[@]}"; do
            echo "::group::solve ${env}"
            if conda env create --dry-run --name "probe-$(basename "${env}" .yaml)" --file "${env}"; then
              echo "OK: ${env} solves"
            else
              echo "::error file=${env}::conda solver could not satisfy ${env}"
              fail=1
            fi
            echo "::endgroup::"
          done
          if [[ "${fail}" -ne 0 ]]; then
            echo "One or more workflow/envs/*.yaml failed to solve — see the ::error annotations above."
            exit 1
          fi
          echo "All workflow/envs/*.yaml solve cleanly."
