# =============================================================================
# GPU overlay config — for use on the GCP GPU VM only
# =============================================================================
#
# Enables GPU-accelerated steps (MHCflurry + TCRdock). Overrides the
# corresponding sections of config/config.yaml. Pass as a second
# --configfile argument on the GPU VM:
#
#   snakemake --cores $(nproc) --use-conda --rerun-triggers mtime \
#       --configfile config/config.yaml config/gpu_config.yaml
#
# Paths below match the output of scripts/setup_vm.sh.
# DO NOT set tcrdock.enabled: true in config/config.yaml — keep that as the
# local/CPU default. This file is the only place TCRdock is enabled.
# =============================================================================

tcrdock:
  enabled: true
  n_candidates: 1
  docker_image: "tcrdock:latest"  # built by setup_vm.sh

  # Volume-staged reference data (Issue #844 image slimming). On RunPod the AlphaFold
  # params live on the Network Volume and are bind-mounted into the container instead
  # of being baked into the ~25 GB image. The SLIMMED image REQUIRES params_host_dir
  # set; an empty value means params are baked in (legacy / pre-slim image).
  params_host_dir: "/workspace/alphafold_params"
  # BLAST DB externalization is deferred to the #845 smoke test: download_blast.py's
  # install path is internal to the TCRdock clone and unknown from our repo, so until
  # #845 resolves it BLAST stays baked in the image and both keys stay empty (no mount).
  blast_host_dir: ""
  blast_container_path: ""

  # Fallback HLA alleles — overridden by HLA typing (#23) when available
  fallback_hla:
    A: "HLA-A*02:01"
    B: "HLA-B*07:02"
    C: "HLA-C*07:02"

  # Fallback TCR — DMF5 (HLA-A*02:01-restricted, structural demo)
  # Overridden by TRUST4 TCR extraction (#24) when available
  fallback_tcr:
    va_gene:  "TRAV12-2"
    ja_gene:  "TRAJ21"
    cdr3a:    "CAVNFGGGKLI"
    vb_gene:  "TRBV6-5"
    jb_gene:  "TRBJ2-7"
    cdr3b:    "CASSLAGGRPEQYF"
