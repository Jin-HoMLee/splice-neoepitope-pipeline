# ============================================================
# Splice Neoepitope Pipeline — Configuration
# ============================================================

# -----------------------------------------------------------------
# Sample manifest (required — no default)
# -----------------------------------------------------------------
# Pass at runtime via --config samples_tsv=config/samples/<patient>.tsv
# Per-patient samplesheets live in config/samples/. Columns:
#   patient_id   sample_id    sample_type    fastq1    fastq2
#
# sample_type values:
#   "Primary Tumor"        — junctions used for neoepitope prediction
#   "Solid Tissue Normal"  — filters out non-tumor-specific junctions
#   "Blood Derived Normal" — used for HLA typing only (WES or RNA-seq)
#
# For single-end data, leave fastq2 empty.
# gs:// paths are downloaded automatically by the download_fastq rule.

# -----------------------------------------------------------------
# GCS integration (cloud runs only)
# -----------------------------------------------------------------
# Set bucket to enable BAM upload after alignment and to stage FASTQs.
# Layout: gs://<bucket>/fastq/<patient_id>/  and  results/<patient_id>/
# Leave empty to skip all GCS operations.
gcs:
  bucket: "gs://splice-neoepitope-project"

# -----------------------------------------------------------------
# Output directories
# -----------------------------------------------------------------
output:
  results_dir:  "results"   # all patient outputs land under results/{patient_id}/
  logs:         "logs"

# -----------------------------------------------------------------
# Reference genome
# -----------------------------------------------------------------
reference:
  genome: "GRCh38"
  # Local paths (populated after download / placed by the user)
  genome_fasta: "resources/GRCh38.primary_assembly.genome.fa"
  gencode_gtf:  "resources/gencode.v47.annotation.gtf.gz"
  # Output: reference junction list derived from GENCODE GTF
  junction_bed: "resources/reference_junctions.bed"

# -----------------------------------------------------------------
# Alignment
# -----------------------------------------------------------------
# Aligner options:
#   "star"   — Full accuracy, requires ~32 GB RAM
#   "hisat2" — Lower memory (~8 GB), good for laptops/small servers
alignment:
  aligner: "hisat2"                           # "star" (32 GB RAM) or "hisat2" (8 GB RAM)
  hisat2_index_dir: "resources/hisat2_index"  # where the prebuilt HISAT2 index lives
  star_index_dir: "resources/star_index"      # where the prebuilt STAR index lives
  threads: 8          # threads for index build + alignment

# -----------------------------------------------------------------
# Junction read-count filtering
# -----------------------------------------------------------------
filtering:
  # Minimum reads in the normal sample to trust a junction as patient-specific
  min_normal_reads: 2

# -----------------------------------------------------------------
# Contig assembly
# -----------------------------------------------------------------
assembly:
  upstream_nt:   26   # nt upstream of the splice junction
  downstream_nt: 24   # nt downstream of the splice junction
  contig_length: 50   # total contig length (upstream + downstream)

# -----------------------------------------------------------------
# Junction-spanning 9-mer extraction
# -----------------------------------------------------------------
# Reads all three reading frames and retains only 27 nt windows
# whose first codon is fully upstream and last codon is fully
# downstream of the splice junction. upstream_nt is shared with
# the assembly section above.

# -----------------------------------------------------------------
# HLA typing (OptiType)
# -----------------------------------------------------------------
# When enabled, OptiType is run on each sample's FASTQ to predict
# patient-specific HLA-A/B/C alleles. The resulting alleles.tsv is
# passed to MHCflurry instead of mhcflurry.fallback_alleles.
hla:
  enabled: true
  min_reads_per_locus: 30   # minimum OptiType Reads count to trust a call
  threads: 4                # threads for razers3 read mapping per OptiType sample
  solver: "cbc"            # ILP solver: cbc (recommended), glpk, or cplex
  ilp_threads: 4           # threads for the ILP solver; used by CBC if supported by the build

# -----------------------------------------------------------------
# Epitope prediction (MHCflurry 2.x)
# -----------------------------------------------------------------
# MHCflurry is an open-source MHC-I binding predictor that achieves
# state-of-the-art performance without requiring academic registration.
# It can be installed via pip and is included in the python conda env.
mhcflurry:
  # HLA-A/B/C alleles used for prediction when hla.enabled is false, or
  # per-locus when OptiType returns no confident call (too few HLA reads).
  fallback_alleles:
    A: "HLA-A*02:01"
    B: "HLA-B*07:02"
    C: "HLA-C*07:02"
  ic50_strong:  50            # nM threshold for strong binders
  ic50_weak:   500            # nM threshold for weak binders
  threads: 8                  # parallel allele predictions (n1-standard-8)
  # MHCflurry supports multiple prediction modes:
  #   "affinity"        - binding affinity only (IC50)
  #   "presentation"    - presentation score (recommended)
  #   "processing"      - antigen processing score
  prediction_mode: "affinity"

# -----------------------------------------------------------------
# TCRdock structural validation (Step 6 — optional, GPU required)
# -----------------------------------------------------------------
# Disabled by default. All settings live in config/tcrdock_gpu.yaml.
# Enable by passing that file as a second --configfile on the GPU VM:
#
#   snakemake --cores $(nproc) --use-conda --rerun-triggers mtime \
#       --configfile config/config.yaml config/tcrdock_gpu.yaml
#
# See scripts/setup_tcrdock_vm.sh for GPU VM setup instructions.
tcrdock:
  enabled: false