# ============================================================
# Splice Neoepitope Pipeline — Configuration
# ============================================================

# -----------------------------------------------------------------
# Data source mode: "gdc" or "fastq"
# -----------------------------------------------------------------
# "gdc"   — Download pre-computed splice junction files from GDC (requires
#           institutional dbGaP access and a GDC authentication token)
# "fastq" — Align your own RNA-Seq FASTQ files using HISAT2 or STAR (no
#           institutional access required; uses publicly available or your own data)
data_source: "fastq"

# -----------------------------------------------------------------
# Sample manifest (used when data_source is "fastq")
# -----------------------------------------------------------------
# Path to a TSV listing the RNA-Seq FASTQs for this patient. Columns:
#   sample_id    sample_type    fastq1    fastq2
#
# Example (samples.tsv):
#   sample_id    sample_type         fastq1                    fastq2
#   tumor_01     Primary Tumor       data/tumor_01_R1.fq.gz    data/tumor_01_R2.fq.gz
#   normal_01    Solid Tissue Normal data/normal_01_R1.fq.gz   data/normal_01_R2.fq.gz
#
# For single-end data, leave fastq2 empty.
samples_tsv: "config/samples.tsv"

# -----------------------------------------------------------------
# Alignment (used when data_source is "fastq")
# -----------------------------------------------------------------
# How to align the FASTQs listed in samples_tsv above. This is the
# open-access alternative to GDC downloads.
#
# Aligner options:
#   "star"   — Full accuracy, requires ~32 GB RAM (default)
#   "hisat2" — Lower memory (~8 GB), good for laptops/small servers
alignment:
  aligner: "hisat2"                           # "star" (32 GB RAM) or "hisat2" (8 GB RAM)
  hisat2_index_dir: "resources/hisat2_index"  # where the prebuilt HISAT2 index lives
  star_index_dir: "resources/star_index"      # where the prebuilt STAR index lives

# -----------------------------------------------------------------
# GDC Data Portal API (when data_source is "gdc")
# -----------------------------------------------------------------
gdc:
  files_endpoint: "https://api.gdc.cancer.gov/files"
  data_endpoint:  "https://api.gdc.cancer.gov/data"
  # Maximum files to download per cancer type (set to null for all)
  max_files_per_project: null
  # GDC authentication token file (required for controlled-access data)
  # Obtain from: https://portal.gdc.cancer.gov/ → login → Download Token
  # Save the downloaded token file and set the path here
  token_file: null   # e.g. "~/.gdc-user-token.txt"

# -----------------------------------------------------------------
# Reference genome
# -----------------------------------------------------------------
reference:
  genome: "GRCh38"
  # Local paths (populated after download / placed by the user)
  genome_fasta: "resources/GRCh38.primary_assembly.genome.fa"
  gencode_gtf:  "resources/gencode.v47.annotation.gtf.gz"
  # Output: reference junction list derived from GENCODE GTF
  junction_bed: "resources/reference_junctions.bed"

# -----------------------------------------------------------------
# Contig assembly
# -----------------------------------------------------------------
assembly:
  upstream_nt:   26   # nt upstream of the splice junction
  downstream_nt: 24   # nt downstream of the splice junction
  contig_length: 50   # total contig length (upstream + downstream)

# -----------------------------------------------------------------
# Junction-spanning 9-mer extraction
# -----------------------------------------------------------------
# Reads all three reading frames and retains only 27 nt windows
# whose first codon is fully upstream and last codon is fully
# downstream of the splice junction. upstream_nt is shared with
# the assembly section above.

# -----------------------------------------------------------------
# Epitope prediction (MHCflurry 2.x)
# -----------------------------------------------------------------
# MHCflurry is an open-source MHC-I binding predictor that achieves
# state-of-the-art performance without requiring academic registration.
# It can be installed via pip and is included in the python conda env.
# -----------------------------------------------------------------
# HLA typing (arcasHLA)
# -----------------------------------------------------------------
# When enabled, patient-specific HLA-A/B/C alleles are typed from
# the aligned BAM files and used for epitope prediction.
# Requires data_source: "fastq".
# When disabled, fallback_alleles are used for all predictions.
hla:
  enabled: true
  min_reads_per_locus: 50    # minimum reads to trust a typed allele
  fallback_alleles:          # used when hla.enabled is false, or as a
    A: "HLA-A*02:01"         # safety net when typing fails for a locus
    B: "HLA-B*07:02"
    C: "HLA-C*07:02"

mhcflurry:
  ic50_strong:  50            # nM threshold for strong binders
  ic50_weak:   500            # nM threshold for weak binders
  # MHCflurry supports multiple prediction modes:
  #   "affinity"        - binding affinity only (IC50)
  #   "presentation"    - presentation score (recommended)
  #   "processing"      - antigen processing score
  prediction_mode: "affinity"

# -----------------------------------------------------------------
# TCRdock structural validation (Step 6 — optional, GPU required)
# -----------------------------------------------------------------
# Disabled by default. All settings live in config/tcrdock_gpu.yaml.
# Enable by passing that file as a second --configfile on the GPU VM:
#
#   snakemake --cores $(nproc) --use-conda --rerun-triggers mtime \
#       --configfile config/config.yaml config/tcrdock_gpu.yaml
#
# See scripts/setup_tcrdock_vm.sh for GPU VM setup instructions.
tcrdock:
  enabled: false

# -----------------------------------------------------------------
# Junction read-count filtering
# -----------------------------------------------------------------
filtering:
  # Minimum reads in the normal sample to trust a junction as patient-specific
  min_normal_reads: 2

# -----------------------------------------------------------------
# Output directories
# -----------------------------------------------------------------
output:
  raw_data:     "results/raw_data"
  junctions:    "results/junctions"
  contigs:      "results/contigs"
  peptides:     "results/peptides"
  predictions:  "results/predictions"
  analysis:     "results/analysis"
  reports:      "results/reports"
  logs:         "logs"
