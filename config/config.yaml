# ============================================================
# Splice Neoepitope Pipeline — Configuration
# ============================================================

# -----------------------------------------------------------------
# Sample manifest (required — no default)
# -----------------------------------------------------------------
# Pass at runtime via --config samples_tsv=config/samples/<patient>.tsv
# Per-patient samplesheets live in config/samples/. Columns:
#   patient_id   sample_id    sample_type    fastq1    fastq2
#
# sample_type values:
#   "Primary Tumor"        — junctions used for neoepitope prediction
#   "Solid Tissue Normal"  — filters out non-tumor-specific junctions
#   "Blood Derived Normal" — used for HLA typing only (WES or RNA-seq)
#
# For single-end data, leave fastq2 empty.
# gs:// paths are downloaded automatically by the download_fastq rule.

# -----------------------------------------------------------------
# Output directories
# -----------------------------------------------------------------
output:
  results_dir:  "results"   # all patient outputs land under results/{patient_id}/
  logs:         "logs"

# -----------------------------------------------------------------
# Reference genome
# -----------------------------------------------------------------
reference:
  genome: "GRCh38"
  # Local paths (populated after download / placed by the user)
  # nf-core layout (Issue #63): user-provided + downloaded references live in
  # references/ (gitignored, outside the repo source tree). Override with absolute
  # paths to use a shared/cached download location across clones.
  genome_fasta: "references/GRCh38.primary_assembly.genome.fa"
  gencode_gtf:  "references/gencode.v47.annotation.gtf.gz"
  # Output: reference junction list derived from GENCODE GTF
  junction_bed: "references/reference_junctions.bed"

# -----------------------------------------------------------------
# Alignment
# -----------------------------------------------------------------
# Aligner options:
#   "star"   — Full accuracy, requires ~32 GB RAM
#   "hisat2" — Lower memory (~8 GB), good for laptops/small servers
alignment:
  aligner: "star"                            # "star" (32 GB RAM) or "hisat2" (8 GB RAM)
  # nf-core layout (Issue #63): pipeline-built indices live in indices/ (gitignored).
  hisat2_index_dir: "indices/hisat2"         # where the HISAT2 index lives
  hisat2_prebuilt_url: "https://genome-idx.s3.amazonaws.com/hisat/hg38_tran.tar.gz"  # leave empty to build from genome_fasta; delete indices/hisat2/ to force re-download
  star_index_dir: "indices/star"             # where the prebuilt STAR index lives
  threads: 8          # threads for index build + alignment

# -----------------------------------------------------------------
# Junction read-count filtering
# -----------------------------------------------------------------
filtering:
  # Minimum reads in the normal sample to trust a junction as patient-specific
  min_normal_reads: 2

# -----------------------------------------------------------------
# Peptide translation
# -----------------------------------------------------------------
# Peptide lengths to extract from each junction contig.
# Contig flank size is derived automatically: flank_nt = 3 * (max_length - 1).
# For [8, 9, 10] this gives symmetric 27 nt flanks (54 nt contigs).
translation:
  peptide_lengths: [8, 9, 10]

# -----------------------------------------------------------------
# Proteome filter (Step 4b — optional but recommended)
# -----------------------------------------------------------------
# Removes translated peptides that already exist in the canonical human
# proteome (UniProt Swiss-Prot). Such peptides are self-peptides and
# cannot be neoantigens. Also reduces input to MHCflurry.
# Disable for speed on test runs: set enabled: false.
proteome_filter:
  enabled: true
  proteome_fasta: "references/human_proteome.fasta"

# -----------------------------------------------------------------
# HLA typing (OptiType)
# -----------------------------------------------------------------
# When enabled, OptiType is run on each sample's FASTQ to predict
# patient-specific HLA-A/B/C alleles. The resulting alleles.tsv is
# passed to MHCflurry instead of mhcflurry.fallback_alleles.
hla:
  enabled: true
  min_reads_per_locus: 30   # minimum OptiType Reads count to trust a call
  threads: 5                # threads for razers3 read mapping per OptiType sample; ≥5 forces sequential execution on 8-core VMs (prevents concurrent razers3 OOM)
  solver: "cbc"            # ILP solver: cbc (recommended), glpk, or cplex
  ilp_threads: 4           # threads for the ILP solver; used by CBC if supported by the build

# -----------------------------------------------------------------
# Epitope prediction (MHCflurry 2.x)
# -----------------------------------------------------------------
# MHCflurry is an open-source MHC-I binding predictor that achieves
# state-of-the-art performance without requiring academic registration.
# It can be installed via pip and is included in the python conda env.
mhcflurry:
  # HLA-A/B/C alleles used for prediction when hla.enabled is false, or
  # per-locus when OptiType returns no confident call (too few HLA reads).
  fallback_alleles:
    A: "HLA-A*02:01"
    B: "HLA-B*07:02"
    C: "HLA-C*07:02"
  threads: 8                  # cores reserved for TF/BLAS within the single genotype predict() call
  # nf-core layout (Issue #63): location of the MHCflurry "downloads done" sentinel.
  # Default lives outside the repo so it survives a fresh clone. NOTE: only the
  # sentinel is controlled by this key — the actual model cache stays in MHCflurry's
  # platformdirs default (~/.local/share/mhcflurry/) until MHCFLURRY_DATA_DIR wiring
  # lands (PR follow-up).
  models_cache_dir: "~/.mhcflurry"
  # Percentile thresholds for presentation_class (lower = better, per allele).
  presentation_percentile_strong:  0.5   # top 0.5% by presentation score → strong
  presentation_percentile_weak:    2.0   # top 2.0% by presentation score → weak
  # HLA-C weight in genotype_presentation_score formula (A/B = 1.0; C ≈ 0.5 surface density)
  hla_c_weight:                    0.5

# -----------------------------------------------------------------
# TCRdock structural validation (Step 6 — optional, GPU required)
# -----------------------------------------------------------------
# Disabled by default. All settings live in config/gpu_config.yaml.
# Enable by passing that file as a second --configfile on the GPU VM:
#
#   snakemake --cores $(nproc) --use-conda --rerun-triggers mtime \
#       --configfile config/config.yaml config/gpu_config.yaml
#
# See scripts/setup_vm.sh for GPU VM setup instructions.
tcrdock:
  enabled: false
  # VDJdb panel fetch (Issue #204) — runs whenever hla.enabled is true,
  # independent of the tcrdock.enabled GPU gate.
  vdjdb_release: "2026-05-16"
  vdjdb_sha256: "0dce79ec55c109000da10b7bc72300e352ffb7df92d5de30682de20bab35a366"
  vdjdb_min_score: 2
  vdjdb_panel_size: 10