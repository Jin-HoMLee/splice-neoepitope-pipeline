# ============================================================
# Splice Neoepitope Pipeline — Test Configuration (chr22)
# ============================================================
#
# Minimal configuration for local development and testing on macOS.
# Uses chr22 only: ~52 MB FASTA, ~1 GB HISAT2 index, fast builds.
#
# Usage:
#   snakemake --cores 4 --use-conda --configfile config/test_config.yaml
#
# Prepare test data first (one-time setup):
#   bash scripts/prepare_test_data.sh
# ============================================================

# Only keys that differ from config.yaml are set here. Everything
# else (aligner, assembly, mhcflurry, filtering) is inherited from
# config.yaml, which Snakemake loads first via the `configfile:`
# directive in the Snakefile before merging this file on top
# (recursive merge, per-key).

samples_tsv: "config/test_samples.tsv"

alignment:
  hisat2_index_dir: "resources/test/hisat2_index"   # separate from production index
  star_index_dir: "resources/test/star_index"        # separate from production index
  threads: 4      # M1 MacBook Air (8 GB RAM) — leave headroom for other processes

reference:
  genome: "GRCh38_chr22"
  genome_fasta: "resources/test/chr22.fa"
  gencode_gtf:  "resources/test/chr22.gtf.gz"
  junction_bed: "resources/test/chr22_reference_junctions.bed"

hla:
  enabled: true

output:
  raw_data:     "results/test/raw_data"
  junctions:    "results/test/junctions"
  contigs:      "results/test/contigs"
  peptides:     "results/test/peptides"
  predictions:  "results/test/predictions"
  analysis:     "results/test/analysis"
  reports:      "results/test/reports"
  logs:         "logs/test"
