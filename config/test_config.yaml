# ============================================================
# Splice Neoepitope Pipeline — Test Configuration (chr22)
# ============================================================
#
# Minimal configuration for local development and testing on macOS.
# Uses chr22 only: ~52 MB FASTA, ~1 GB HISAT2 index, fast builds.
#
# Usage:
#   snakemake --cores 4 --use-conda --configfile config/test_config.yaml
#
# Prepare test data first (one-time setup):
#   bash scripts/prepare_test_data.sh
# ============================================================

# Only keys that differ from config.yaml are set here. Everything
# else (aligner, assembly, mhcflurry, filtering) is inherited from
# config.yaml, which Snakemake loads first via the `configfile:`
# directive in the Snakefile before merging this file on top
# (recursive merge, per-key).
#
# Outputs land in the same results/ and logs/ as production, namespaced
# by patient_id=patient_001_test — nf-core style (no separate test output dir).

samples_tsv: "config/samples/patient_001_test.tsv"

reference:
  genome: "GRCh38_chr22"
  genome_fasta: "resources/test/chr22.fa"
  gencode_gtf:  "resources/test/chr22.gtf.gz"
  junction_bed: "resources/test/chr22_reference_junctions.bed"

alignment:
  # Default stays hisat2 because it is the aligner that runs NATIVELY on macOS.
  # The old reason given here ("M1 8 GB can't fit STAR's 32 GB index") is FALSE at
  # chr22 scale: the chr22 STAR index is 407 MB and builds in seconds. 32 GB is the
  # whole-genome suffix array. The real blocker was that bioconda's macOS STAR
  # reads ZERO reads from every FASTQ (ADR-0003).
  # To run the STAR path locally, layer the STAR overlay on top and go through the
  # linux-64 container (Issue #1162):
  #   bash scripts/run_local_linux64.sh --cores 4 --use-conda \
  #     --configfile config/test_config.yaml config/test_star_config.yaml
  aligner: "hisat2"
  hisat2_index_dir: "resources/test/hisat2_index"   # separate from production index
  hisat2_prebuilt_url: ""                            # build from chr22 FASTA (no pre-built available)
  star_index_dir: "resources/test/star_index"        # separate from production index
  threads: 4      # M1 MacBook Air (8 GB RAM) — leave headroom for other processes

hla:
  enabled: true

mhcflurry:
  threads: 4      # M1 MacBook Air (8 GB RAM)

# GTEx pan-tissue filter (Issue #212): point reference_bed at the local chr22
# fixture so the gs:// download rule never fires for the test run. enabled: true is
# inherited from config.yaml. The fixture is gitignored + GCS-staged and fetched
# (with SHA256 verify) by scripts/prepare_test_data.sh.
gtex_filter:
  reference_bed: "resources/test/gtex_gtexv2_pan_tissue_junctions.chr22.bed"
